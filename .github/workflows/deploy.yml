name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      command:
        description: "Kamal command to run"
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - setup

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      packages: write

    env:
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      MAILER_FROM: ${{ secrets.MAILER_FROM }}

    steps:
      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Add EC2 host to SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy with Kamal
        run: bundle exec kamal ${{ github.event.inputs.command || 'deploy' }}
