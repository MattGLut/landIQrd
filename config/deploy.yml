# Name of your application. Used to uniquely configure containers.
service: prop_man

# Name of the container image. Must match GHCR: ghcr.io/<owner>/<repo>.
image: mattglut/prop_man

# Deploy to these servers.
servers:
  web:
    - 18.225.110.137

# No SSL for now (bare IP, no domain). Enable ssl + host when a domain is ready.
proxy:
  ssl: false
  host: 18.225.110.137

# Container registry (GitHub Container Registry).
registry:
  server: ghcr.io
  username: MattGLut
  password:
    - KAMAL_REGISTRY_PASSWORD

# Inject ENV variables into containers (secrets come from .kamal/secrets).
env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    - REDIS_URL
    - SENDGRID_API_KEY
    - MAILER_FROM
  clear:
    MAILER_HOST: 18.225.110.137
    AWS_REGION: us-east-2
    S3_BUCKET: landiqrd-staging
    SOLID_QUEUE_IN_PUMA: true
    # RAILS_LOG_LEVEL: debug

# SSH into EC2 Ubuntu instances as the ubuntu user.
ssh:
  user: ubuntu

# Aliases triggered with "bin/kamal <alias>".
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Persistent storage volume.
volumes:
  - "prop_man_storage:/rails/storage"

# Bridge fingerprinted assets between deploys.
asset_path: /rails/public/assets

# Build amd64 images (EC2 is x86).
builder:
  arch: amd64

# Redis accessory on the same EC2 host.
accessories:
  redis:
    image: valkey/valkey:8
    host: 18.225.110.137
    port: "127.0.0.1:6379:6379"
    directories:
      - data:/data
